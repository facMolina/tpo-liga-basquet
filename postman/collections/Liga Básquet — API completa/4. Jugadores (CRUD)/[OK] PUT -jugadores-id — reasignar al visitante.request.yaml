$kind: http-request
name: "[OK] PUT /jugadores/:id — reasignar al visitante"
url: "{{baseUrl}}/jugadores/{{idJugador}}"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: '{"idEquipo":{{idEquipoVisitante}}}'
scripts:
  - type: afterResponse
    code: pm.test('status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 5000
