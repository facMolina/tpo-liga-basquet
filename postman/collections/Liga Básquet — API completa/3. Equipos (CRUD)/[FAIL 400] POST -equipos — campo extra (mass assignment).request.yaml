$kind: http-request
name: "[FAIL 400] POST /equipos — campo extra (mass assignment)"
url: "{{baseUrl}}/equipos"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: "{\r

    \    \"nombre\": \"Hack\",\r

    \    \"entrenador\": \"Y\",\r

    \    \"partidosGanados\": 999\r

    }"
scripts:
  - type: afterResponse
    code: pm.test('status 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 10000
