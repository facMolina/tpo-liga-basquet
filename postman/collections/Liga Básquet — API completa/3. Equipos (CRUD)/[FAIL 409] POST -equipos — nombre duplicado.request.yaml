$kind: http-request
name: "[FAIL 409] POST /equipos — nombre duplicado"
url: "{{baseUrl}}/equipos"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: "{\r

    \    \"nombre\": \"{{nombreEquipoLocal}}\",\r

    \    \"entrenador\": \"Otro\"\r

    }"
scripts:
  - type: afterResponse
    code: pm.test('status 409', () => pm.response.to.have.status(409));
    language: text/javascript
order: 11000
