$kind: http-request
name: "[FAIL 403] GET /auth/me — token inválido"
url: "{{baseUrl}}/auth/me"
method: GET
headers:
  Authorization: Bearer abc.invalid.token
scripts:
  - type: afterResponse
    code: pm.test('status 403', () => pm.response.to.have.status(403));
    language: text/javascript
order: 9000
