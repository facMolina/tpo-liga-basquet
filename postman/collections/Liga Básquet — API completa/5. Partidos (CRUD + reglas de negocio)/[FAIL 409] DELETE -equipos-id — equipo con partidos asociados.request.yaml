$kind: http-request
name: "[FAIL 409] DELETE /equipos/:id — equipo con partidos asociados (RESTRICT)"
url: "{{baseUrl}}/equipos/{{idEquipoLocal}}"
method: DELETE
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: pm.test('status 409', () => pm.response.to.have.status(409));
    language: text/javascript
order: 17000
