$kind: http-request
name: "[FAIL 400] POST /partidos — local == visitante"
url: "{{baseUrl}}/partidos"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: "{\r

    \    \"fecha\": \"2026-05-15\",\r

    \    \"hora\": \"19:00\",\r

    \    \"lugar\": \"X\",\r

    \    \"idLocal\": {{idEquipoLocal}},\r

    \    \"idVisitante\": {{idEquipoLocal}}\r

    }"
scripts:
  - type: afterResponse
    code: pm.test('status 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 8000
