$kind: http-request
name: "[FAIL 409] DELETE /ligas/:id — liga con equipos asociados (RESTRICT)"
url: "{{baseUrl}}/ligas/{{idLiga}}"
method: DELETE
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: pm.test('status 409', () => pm.response.to.have.status(409));
    language: text/javascript
order: 16500
