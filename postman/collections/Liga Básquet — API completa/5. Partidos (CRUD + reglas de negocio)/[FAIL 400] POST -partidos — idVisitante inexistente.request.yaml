$kind: http-request
name: "[FAIL 400] POST /partidos — idVisitante inexistente"
url: "{{baseUrl}}/partidos"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: '{"fecha":"2026-05-15","hora":"19:00","lugar":"X","idLocal":{{idEquipoLocal}},"idVisitante":99999}'
scripts:
  - type: afterResponse
    code: pm.test('status 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 10000
