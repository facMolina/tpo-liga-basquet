$kind: http-request
name: "[FAIL 400] PUT /partidos/:id — partido con resultado cargado"
url: "{{baseUrl}}/partidos/{{idPartido}}"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: '{"lugar":"No debería poder cambiar"}'
scripts:
  - type: afterResponse
    code: pm.test('status 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 8000
