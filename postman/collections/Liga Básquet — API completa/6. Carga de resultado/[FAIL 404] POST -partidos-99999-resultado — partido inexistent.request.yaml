$kind: http-request
name: "[FAIL 404] POST /partidos/99999/resultado — partido inexistente"
url: "{{baseUrl}}/partidos/99999/resultado"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: '{"puntosLocal":50,"puntosVisitante":40}'
scripts:
  - type: afterResponse
    code: pm.test('status 404', () => pm.response.to.have.status(404));
    language: text/javascript
order: 5000
