$kind: http-request
name: "[OK] PUT /ligas/:id — actualizar"
url: "{{baseUrl}}/ligas/{{idLiga}}"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: '{"nombre":"Liga Test Postman v2","temporada":"2026","descripcion":"Actualizada"}'
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 200', () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test('nombre actualizado', () => pm.expect(json.nombre).to.eql('Liga Test Postman v2'));
    language: text/javascript
order: 4000
