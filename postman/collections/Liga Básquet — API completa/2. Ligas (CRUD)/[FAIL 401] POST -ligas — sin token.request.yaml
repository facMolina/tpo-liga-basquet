$kind: http-request
name: "[FAIL 401] POST /ligas — sin token"
url: "{{baseUrl}}/ligas"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"nombre":"X","temporada":"2026"}'
scripts:
  - type: afterResponse
    code: pm.test('status 401', () => pm.response.to.have.status(401));
    language: text/javascript
order: 5000
